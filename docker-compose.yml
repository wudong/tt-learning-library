services:
  db:
    image: postgres:16-alpine
    container_name: tt-learning-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ttlearn
      POSTGRES_PASSWORD: ttlearn_local
      POSTGRES_DB: tt_learning
    ports:
      - "5433:5432"
    volumes:
      - tt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttlearn -d tt_learning"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tt_pgdata: