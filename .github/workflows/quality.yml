name: Quality

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ttlearn
          POSTGRES_PASSWORD: ttlearn_test
          POSTGRES_DB: tt_learning
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ttlearn -d tt_learning"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://ttlearn:ttlearn_test@localhost:5432/tt_learning?sslmode=disable
      TEST_DATABASE_URL: postgres://ttlearn:ttlearn_test@localhost:5432/tt_learning?sslmode=disable
      TEST_SCHEMA: tt_test
      HOSTED_AUTH_REQUIRED: "false"
      WEB_ORIGIN: http://localhost:5174
      PUBLIC_APP_ORIGIN: http://localhost:5174

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test public sharing
        run: bun test tests/integration/share.test.ts

      - name: Test concurrent migrations
        run: bun test tests/migrationConcurrency.test.ts

      - name: Test full suite
        run: |
          set -o pipefail
          bun test 2>&1 | tee full-test-output.log

      - name: Upload full test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-test-output
          path: full-test-output.log
          if-no-files-found: ignore

      - name: Migrate database
        run: bun run db:migrate

      - name: Build
        run: bun run build

      - name: Verify PWA
        run: bun run test:pwa
